<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Promura Missed Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-red: #FF3B30;
            --glass-bg: rgba(20, 20, 20, 0.7);
            --glass-border: rgba(255, 255, 255, 0.12);
        }
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #000;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(0, 122, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(255, 59, 48, 0.05) 0%, transparent 40%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        .liquid-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-card:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.06);
        }
        .status-dot {
            box-shadow: 0 0 12px currentColor;
        }
        .ios-tab-bar {
            padding-bottom: env(safe-area-inset-bottom);
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .safe-top {
            padding-top: env(safe-area-inset-top);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes progress-pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); opacity: 0.95; }
            50% { box-shadow: 0 0 30px rgba(59, 130, 246, 0.8); opacity: 1; }
        }
        .animate-progress-pulse {
            animation: progress-pulse 3s ease-in-out infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .animate-shimmer {
            animation: shimmer 3s infinite linear;
        }
        @keyframes completion-glow {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 5px rgba(52, 199, 89, 0.5)); }
            50% { filter: brightness(1.3) drop-shadow(0 0 20px rgba(52, 199, 89, 0.8)); }
        }
        .animate-completion {
            animation: completion-glow 2s ease-in-out infinite;
        }
        ::-webkit-scrollbar {
            width: 0px;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>

    "firebase/firestore": "https://esm.sh/firebase@11.1.0/firestore",
    "firebase/": "https://esm.sh/firebase@^12.9.0/",
    "express": "https://esm.sh/express@^5.2.1",

  }
}
